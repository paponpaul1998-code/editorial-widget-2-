<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial Widget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0ede8;
    --muted: #666;
    --faint: #2a2a2a;
    --ar: #a89be8;
    --ar-bg: #1a1730;
    --ar-border: #2e2650;
    --cl: #e8845a;
    --cl-bg: #1f1510;
    --cl-border: #3a2218;
    --ae: #5aabe8;
    --ae-bg: #0f1a24;
    --ae-border: #1a2e3a;
    --ok: #5ae8a0;
    --ok-bg: #0f2419;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); padding: 24px; font-size: 14px; }

  .setup { display: flex; flex-direction: column; gap: 12px; }
  .setup-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .input-row { display: flex; gap: 8px; }
  input[type=text], input[type=password] {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 8px 12px; outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--muted); }
  .btn {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
    padding: 8px 14px; border-radius: 5px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    transition: background 0.15s; white-space: nowrap;
  }
  .btn:hover { background: #2a2a2a; }
  .hint { font-size: 11px; color: var(--muted); line-height: 1.5; }

  .main { display: none; }
  .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
  .week-block { display: flex; align-items: baseline; gap: 10px; }
  .week-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .week-number { font-family: var(--mono); font-size: 28px; font-weight: 500; line-height: 1; }
  .cycle-badge { font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 3px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
  .date-range { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  .cycle-nav { display: flex; gap: 6px; margin-bottom: 20px; }
  .cycle-dot { width: 24px; height: 4px; border-radius: 2px; background: var(--faint); }
  .cycle-dot.active { background: var(--text); }

  .section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  .posts-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
  .post-row {
    display: grid; grid-template-columns: 60px 1fr auto;
    align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 6px; border: 1px solid transparent;
  }
  .post-row.ar { background: var(--ar-bg); border-color: var(--ar-border); }
  .post-row.cl { background: var(--cl-bg); border-color: var(--cl-border); }
  .post-row.ae { background: var(--ae-bg); border-color: var(--ae-border); }
  .post-row.done { background: var(--ok-bg); border-color: #1a3a2a; opacity: 0.65; }

  .post-day { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .post-info { display: flex; flex-direction: column; gap: 2px; }
  .post-template { font-size: 13px; font-weight: 500; }
  .ar .post-template { color: var(--ar); }
  .cl .post-template { color: var(--cl); }
  .ae .post-template { color: var(--ae); }
  .done .post-template { color: var(--ok); text-decoration: line-through; }
  .post-cat { font-size: 11px; color: var(--muted); }
  .post-status { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .post-status.placed { color: var(--ok); }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .summary-card { padding: 10px; border-radius: 5px; border: 1px solid; }
  .summary-card.ar { background: var(--ar-bg); border-color: var(--ar-border); }
  .summary-card.cl { background: var(--cl-bg); border-color: var(--cl-border); }
  .summary-card.ae { background: var(--ae-bg); border-color: var(--ae-border); }
  .summary-nums { display: flex; align-items: baseline; gap: 4px; margin-bottom: 3px; }
  .summary-done { font-family: var(--mono); font-size: 18px; font-weight: 500; }
  .ar .summary-done { color: var(--ar); }
  .cl .summary-done { color: var(--cl); }
  .ae .summary-done { color: var(--ae); }
  .summary-total { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .summary-label { font-size: 10px; color: var(--muted); line-height: 1.3; }

  .footer { display: flex; align-items: center; justify-content: space-between; }
  .refresh-btn { font-family: var(--mono); font-size: 10px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0; transition: color 0.15s; }
  .refresh-btn:hover { color: var(--text); }
  .last-update { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .reset-btn { font-family: var(--mono); font-size: 10px; color: #555; background: none; border: none; cursor: pointer; padding: 0; }
  .reset-btn:hover { color: #e85a5a; }

  .loader { text-align: center; padding: 32px; font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
  .error-msg { background: #1f1010; border: 1px solid #3a1818; border-radius: 5px; padding: 12px; font-size: 12px; color: #e85a5a; line-height: 1.5; margin-top: 8px; }
  .no-posts { text-align: center; padding: 20px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div class="setup" id="setup">
  <div class="setup-title">Configuration</div>
  <div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Clé API Notion <span style="font-size:10px;">(commence par ntn_...)</span></div>
    <input type="password" id="apiKey" placeholder="ntn_..." style="width:100%;margin-bottom:4px;" />
  </div>
  <div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Database ID</div>
    <div class="input-row">
      <input type="text" id="dbId" placeholder="dd0b96bf..." />
      <button class="btn" onclick="saveConfig()">Connecter</button>
    </div>
  </div>
  <div class="hint">Stocké uniquement dans ton navigateur.</div>
  <div id="setupError"></div>
</div>

<div class="main" id="main">
  <div class="header">
    <div class="week-block">
      <span class="week-label">Sem.</span>
      <span class="week-number" id="weekNum">—</span>
      <span class="cycle-badge" id="cycleBadge">—</span>
    </div>
    <div class="date-range" id="dateRange">—</div>
  </div>

  <div class="cycle-nav">
    <div class="cycle-dot" id="dot0"></div>
    <div class="cycle-dot" id="dot1"></div>
    <div class="cycle-dot" id="dot2"></div>
    <div class="cycle-dot" id="dot3"></div>
  </div>

  <div class="section-label">Cette semaine</div>
  <div id="postsList" class="posts-list"></div>

  <div class="divider"></div>

  <div class="section-label" style="margin-bottom:10px;">Ce mois — avancement</div>
  <div class="summary-grid" id="summaryGrid"></div>

  <div class="footer">
    <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
    <span class="last-update" id="lastUpdate"></span>
    <button class="reset-btn" onclick="resetConfig()">Déconnecter</button>
  </div>
</div>

<script>
const PROXY = 'https://corsproxy.io/?url=';

const SCHEDULE = [
  { cycle:0, day:0, cat:'ar', template:'Focus' },
  { cycle:0, day:1, cat:'ar', template:'Le 8ème art' },
  { cycle:0, day:3, cat:'cl', template:'Lifestyle gaming' },
  { cycle:1, day:0, cat:'ar', template:'Analyse statistique' },
  { cycle:1, day:2, cat:'ae', template:'Évènement' },
  { cycle:1, day:3, cat:'cl', template:'Reco culturelle' },
  { cycle:2, day:1, cat:'ar', template:'Review' },
  { cycle:2, day:2, cat:'ar', template:'Le pouvoir des images' },
  { cycle:2, day:4, cat:'ae', template:'Bulletin e-sport' },
  { cycle:3, day:0, cat:'ar', template:'Focus' },
  { cycle:3, day:2, cat:'cl', template:'Lifestyle gaming' },
  { cycle:3, day:3, cat:'ar', template:'Le 8ème art' },
];

const CAT_LABELS = { ar:'Analyse & Review', cl:'Culture & Lifestyle', ae:'Actualité & Évènement' };
const DAYS_SHORT = ['LUN','MAR','MER','JEU','VEN','SAM','DIM'];
const CYCLE_LABELS = ['Semaine A','Semaine B','Semaine C','Semaine D'];

function getISOWeek(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - y) / 86400000) + 1) / 7);
}

function getWeekBounds(date) {
  const d = new Date(date);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  const mon = new Date(d);
  const sun = new Date(d); sun.setDate(sun.getDate() + 6);
  return { mon, sun };
}

function getMonthBounds(date) {
  const first = new Date(date.getFullYear(), date.getMonth(), 1);
  const last = new Date(date.getFullYear(), date.getMonth() + 1, 0);
  return { first, last };
}

function fmtDate(dt) { return dt.toLocaleDateString('fr-FR', { day:'numeric', month:'short' }); }
function toISO(dt) { return dt.toISOString().split('T')[0]; }

function saveConfig() {
  const key = document.getElementById('apiKey').value.trim();
  const db = document.getElementById('dbId').value.trim();
  if (!key || !db) { document.getElementById('setupError').innerHTML = '<div class="error-msg">Remplis les deux champs.</div>'; return; }
  localStorage.setItem('ntn_key', key);
  localStorage.setItem('ntn_db', db);
  showMain();
  loadData();
}

function resetConfig() {
  localStorage.removeItem('ntn_key');
  localStorage.removeItem('ntn_db');
  document.getElementById('main').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
}

function showMain() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}

async function queryNotion(key, dbId, filter) {
  const target = `https://api.notion.com/v1/databases/${dbId}/query`;
  const url = PROXY + encodeURIComponent(target);
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${key}`,
      'Notion-Version': '2022-06-28',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(filter)
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `Erreur HTTP ${res.status}`);
  }
  return res.json();
}

function getCat(page) {
  const props = page.properties;
  const catProp = props['Catégorie'] || props['Cat\u00e9gorie'] || props['categorie'] || props['Category'];
  if (!catProp) return null;
  const val = (catProp.select?.name || catProp.multi_select?.[0]?.name || '').toLowerCase();
  if (val.includes('analyse') || val.includes('review')) return 'ar';
  if (val.includes('culture') || val.includes('lifestyle')) return 'cl';
  if (val.includes('actu') || val.includes('v\u00e8nement') || val.includes('evenement') || val.includes('événement')) return 'ae';
  return null;
}

function getTitle(page) {
  const props = page.properties;
  const p = props['Nom'] || props['Name'] || props['Titre'] || props['Title'];
  return p?.title?.[0]?.plain_text || '';
}

async function loadData() {
  const key = localStorage.getItem('ntn_key');
  const dbId = localStorage.getItem('ntn_db');
  if (!key || !dbId) return;

  const list = document.getElementById('postsList');
  list.innerHTML = '<div class="loader">Chargement...</div>';

  try {
    const now = new Date();
    const weekNum = getISOWeek(now);
    const cycleIdx = (weekNum - 1) % 4;
    const { mon, sun } = getWeekBounds(now);
    const { first, last } = getMonthBounds(now);

    document.getElementById('weekNum').textContent = weekNum;
    document.getElementById('cycleBadge').textContent = CYCLE_LABELS[cycleIdx];
    document.getElementById('dateRange').textContent = `${fmtDate(mon)} – ${fmtDate(sun)}`;
    for (let i = 0; i < 4; i++) {
      document.getElementById('dot' + i).classList.toggle('active', i === cycleIdx);
    }

    const [weekData, monthData] = await Promise.all([
      queryNotion(key, dbId, {
        filter: { and: [
          { property: 'Date de publication', date: { on_or_after: toISO(mon) } },
          { property: 'Date de publication', date: { on_or_before: toISO(sun) } }
        ]}
      }),
      queryNotion(key, dbId, {
        filter: { and: [
          { property: 'Date de publication', date: { on_or_after: toISO(first) } },
          { property: 'Date de publication', date: { on_or_before: toISO(last) } }
        ]}
      })
    ]);

    // Posts placés cette semaine, indexés par jour
    const placedByDay = {};
    weekData.results.forEach(page => {
      const dateVal = page.properties['Date de publication']?.date?.start;
      if (!dateVal) return;
      const dayIdx = (new Date(dateVal).getDay() + 6) % 7;
      if (!placedByDay[dayIdx]) placedByDay[dayIdx] = [];
      placedByDay[dayIdx].push({ cat: getCat(page), title: getTitle(page) });
    });

    // Comptage posts placés ce mois
    const monthCounts = { ar: 0, cl: 0, ae: 0 };
    monthData.results.forEach(page => {
      const cat = getCat(page);
      if (cat) monthCounts[cat]++;
    });

    // Rendu semaine
    const weekSchedule = SCHEDULE.filter(p => p.cycle === cycleIdx).sort((a,b) => a.day - b.day);

    list.innerHTML = weekSchedule.length === 0
      ? '<div class="no-posts">Aucun post prévu cette semaine</div>'
      : weekSchedule.map(p => {
          const placed = placedByDay[p.day];
          const isDone = placed && placed.length > 0;
          const title = isDone ? placed[0].title : p.template;
          return `<div class="post-row ${isDone ? 'done' : p.cat}">
            <div class="post-day">${DAYS_SHORT[p.day]}</div>
            <div class="post-info">
              <div class="post-template">${title}</div>
              <div class="post-cat">${CAT_LABELS[p.cat]}</div>
            </div>
            <div class="post-status ${isDone ? 'placed' : ''}">
              ${isDone ? '✓ Placé' : 'À planifier'}
            </div>
          </div>`;
        }).join('');

    // Rendu résumé mensuel
    const monthlyCounts = { ar: 0, cl: 0, ae: 0 };
    SCHEDULE.forEach(p => monthlyCounts[p.cat]++);

    document.getElementById('summaryGrid').innerHTML = Object.entries(monthlyCounts).map(([cat, total]) =>
      `<div class="summary-card ${cat}">
        <div class="summary-nums">
          <span class="summary-done">${monthCounts[cat]}</span>
          <span class="summary-total">/ ${total}</span>
        </div>
        <div class="summary-label">${CAT_LABELS[cat]}</div>
      </div>`
    ).join('');

    document.getElementById('lastUpdate').textContent =
      `Mis à jour ${new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })}`;

  } catch(e) {
    list.innerHTML = `<div class="error-msg">
      Erreur : ${e.message}<br>
      <span style="font-size:10px;color:#a06060;">Vérifie ta clé API et que l'intégration est bien connectée à ta database Notion.</span>
    </div>`;
  }
}

const savedKey = localStorage.getItem('ntn_key');
const savedDb = localStorage.getItem('ntn_db');
if (savedKey && savedDb) { showMain(); loadData(); }
</script>
</body>
</html>
