<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial Widget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0f0f0f;
    --surface2:  #1e1e1e;
    --border:    #2a2a2a;
    --text:      #f0ede8;
    --muted:     #666;
    --faint:     #2a2a2a;

    --ar:        #9b8fce;
    --ar-bg:     #1e1a30;
    --ar-border: #332b52;

    --cl:        #e07950;
    --cl-bg:     #211610;
    --cl-border: #3d2418;

    --ae:        #5b9bd5;
    --ae-bg:     #101d2a;
    --ae-border: #1a3048;

    --ok:        #52c98a;
    --ok-bg:     #0e2118;
    --ok-border: #1a3a28;

    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); padding: 22px; font-size: 14px; }

  /* ── Setup ── */
  .setup { display: flex; flex-direction: column; gap: 12px; }
  .setup-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  input[type=text], input[type=password] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 8px 12px; outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--muted); }
  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; }
  .btn {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em;
    padding: 8px 14px; border-radius: 5px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    transition: background 0.15s; white-space: nowrap;
  }
  .btn:hover { background: #333; }
  .hint { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .error-msg { background: #1f1010; border: 1px solid #3a1818; border-radius: 5px; padding: 10px 12px; font-size: 12px; color: #e07070; line-height: 1.5; }

  /* ── Main ── */
  .main { display: none; }

  /* Header navigation */
  .header {
    display: grid;
    grid-template-columns: 48px 1fr 48px;
    align-items: center;
    margin-bottom: 20px;
    gap: 4px;
  }
  .nav-btn {
    font-size: 32px;
    font-weight: 300;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
    text-align: center;
    border-radius: 6px;
  }
  .nav-btn:hover { color: var(--text); background: var(--surface2); }
  .nav-btn:disabled { color: var(--faint); cursor: default; background: none; }
  .week-info { text-align: center; }
  .week-number { font-family: var(--mono); font-size: 22px; font-weight: 500; line-height: 1; }
  .week-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; }
  .week-current { font-family: var(--mono); font-size: 10px; color: var(--ok); margin-top: 3px; }

  .section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  /* Posts */
  .posts-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 18px; }
  .post-row {
    display: grid; grid-template-columns: 56px 1fr auto;
    align-items: center; gap: 8px; padding: 9px 11px;
    border-radius: 6px; border: 1px solid transparent;
  }
  .post-row.ar   { background: var(--ar-bg); border-color: var(--ar-border); }
  .post-row.cl   { background: var(--cl-bg); border-color: var(--cl-border); }
  .post-row.ae   { background: var(--ae-bg); border-color: var(--ae-border); }
  .post-row.done { background: var(--ok-bg); border-color: var(--ok-border); opacity: 0.55; }

  .post-day { font-family: var(--mono); font-size: 10px; color: var(--muted); line-height: 1.4; }
  .post-day .day-name { font-size: 11px; color: var(--text); opacity: 0.5; }
  .post-day .day-hint { font-size: 9px; opacity: 0.35; }
  .post-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .post-template { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ar   .post-template { color: var(--ar); }
  .cl   .post-template { color: var(--cl); }
  .ae   .post-template { color: var(--ae); }
  .done .post-template { color: var(--ok); text-decoration: line-through; }
  .post-cat    { font-size: 11px; color: var(--muted); }
  .post-status { font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; }
  .post-status.placed { color: var(--ok); }

  /* Summary */
  .divider { height: 1px; background: var(--border); margin: 14px 0; }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 14px; }
  .summary-card { padding: 9px 10px; border-radius: 5px; border: 1px solid; }
  .summary-card.ar { background: var(--ar-bg); border-color: var(--ar-border); }
  .summary-card.cl { background: var(--cl-bg); border-color: var(--cl-border); }
  .summary-card.ae { background: var(--ae-bg); border-color: var(--ae-border); }
  .summary-nums { display: flex; align-items: baseline; gap: 3px; margin-bottom: 3px; }
  .summary-done  { font-family: var(--mono); font-size: 17px; font-weight: 500; }
  .ar .summary-done { color: var(--ar); }
  .cl .summary-done { color: var(--cl); }
  .ae .summary-done { color: var(--ae); }
  .summary-total { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .summary-label { font-size: 10px; color: var(--muted); line-height: 1.3; }

  /* Footer */
  .footer { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .refresh-btn { font-family: var(--mono); font-size: 10px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0; transition: color 0.15s; }
  .refresh-btn:hover { color: var(--text); }
  .last-update { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .reset-btn { font-family: var(--mono); font-size: 10px; color: #444; background: none; border: none; cursor: pointer; padding: 0; }
  .reset-btn:hover { color: #e07070; }

  /* Éditeur de templates */
  .editor-section { border-top: 1px solid var(--border); padding-top: 14px; }
  .editor-toggle {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 6px; padding: 0; transition: color 0.15s;
    width: 100%;
  }
  .editor-toggle:hover { color: var(--text); }
  .editor-toggle .arrow { transition: transform 0.2s; display: inline-block; font-style: normal; }
  .editor-toggle.open .arrow { transform: rotate(90deg); }
  .editor-panel { display: none; margin-top: 14px; flex-direction: column; gap: 6px; }
  .editor-panel.visible { display: flex; }

  .editor-hint { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 4px; }

  .tpl-row {
    display: grid; grid-template-columns: 1fr 90px 90px 32px;
    gap: 6px; align-items: center;
  }
  .tpl-input {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: var(--sans); font-size: 12px;
    padding: 5px 8px; outline: none; width: 100%;
  }
  .tpl-input:focus { border-color: var(--muted); }
  .tpl-select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: var(--mono); font-size: 10px;
    padding: 5px 6px; outline: none; width: 100%;
  }
  .tpl-del {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    color: #555; font-size: 14px; cursor: pointer; padding: 4px;
    transition: color 0.15s, border-color 0.15s; line-height: 1;
  }
  .tpl-del:hover { color: #e07070; border-color: #5a2020; }
  .editor-actions { display: flex; gap: 8px; margin-top: 4px; }
  .editor-actions .btn { font-size: 10px; padding: 6px 12px; }
  .btn-danger { color: #e07070; border-color: #3a1818; }
  .btn-danger:hover { background: #1f1010; }

  .loader { text-align: center; padding: 28px; font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
  .no-posts { text-align: center; padding: 18px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<!-- Setup -->
<div class="setup" id="setup">
  <div class="setup-title">Configuration</div>
  <div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Clé API Notion</div>
    <input type="password" id="apiKey" placeholder="ntn_..." />
  </div>
  <div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Database ID</div>
    <div class="input-row">
      <input type="text" id="dbId" placeholder="f35b96bf..." />
      <button class="btn" onclick="saveConfig()">Connecter</button>
    </div>
  </div>
  <div class="hint">Stocké uniquement dans ton navigateur.</div>
  <div id="setupError"></div>
</div>

<!-- Main -->
<div class="main" id="main">

  <div class="header">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">‹</button>
    <div class="week-info">
      <div class="week-number">Sem. <span id="weekNum">—</span></div>
      <div class="week-sub" id="dateRange">—</div>
      <div class="week-current" id="currentIndicator"></div>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">›</button>
  </div>

  <div class="section-label">Publications prévues</div>
  <div id="postsList" class="posts-list"></div>

  <div class="divider"></div>

  <div class="section-label" style="margin-bottom:8px;">Ce mois — avancement</div>
  <div class="summary-grid" id="summaryGrid"></div>

  <div class="footer">
    <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
    <span class="last-update" id="lastUpdate"></span>
    <button class="reset-btn" onclick="resetConfig()">Déconnecter</button>
  </div>

  <!-- Éditeur de templates -->
  <div class="editor-section">
    <button class="editor-toggle" id="editorToggle" onclick="toggleEditor()">
      <span class="arrow">▶</span> Modifier les templates
    </button>
    <div class="editor-panel" id="editorPanel">
      <div class="editor-hint">
        Modifie les noms, catégories et semaines de cycle (A=0, B=1, C=2, D=3).<br>
        Les changements sont sauvegardés dans ton navigateur.
      </div>
      <div style="display:grid;grid-template-columns:1fr 90px 90px 32px;gap:6px;margin-bottom:4px;">
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted);padding-left:2px;">NOM DU TEMPLATE</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted);">CATÉGORIE</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted);">CYCLE</div>
        <div></div>
      </div>
      <div id="tplRows"></div>
      <div class="editor-actions">
        <button class="btn" onclick="addTemplate()">+ Ajouter</button>
        <button class="btn btn-danger" onclick="resetTemplates()">Réinitialiser</button>
      </div>
    </div>
  </div>

</div>

<script>
const PROXY = 'https://corsproxy.io/?url=';

/* Jours indicatifs par position dans le cycle (0=lun … 6=dim) */
/* MAR=1, JEU=3, SAM=5 */
const HINT_DAYS = [1, 3, 5];
const DAYS_SHORT = ['LUN','MAR','MER','JEU','VEN','SAM','DIM'];

const CAT_LABELS = {
  ar: 'Analyse/Review',
  cl: 'Culture/Lifestyle',
  ae: 'Actu/Évènement'
};

/* Valeurs exactes dans Notion */
const NOTION_CAT_MAP = {
  ar: 'Analyse/Review',
  cl: 'Culture/Lifestyle',
  ae: 'Actu/Évènement'
};

const DEFAULT_SCHEDULE = [
  { cycle:0, cat:'ar', template:'Focus' },
  { cycle:0, cat:'ar', template:'Le 8ème art' },
  { cycle:0, cat:'cl', template:'Lifestyle gaming' },
  { cycle:1, cat:'ar', template:'Analyse statistique' },
  { cycle:1, cat:'ae', template:'Évènement' },
  { cycle:1, cat:'cl', template:'Reco culturelle' },
  { cycle:2, cat:'ar', template:'Review' },
  { cycle:2, cat:'ar', template:'Le pouvoir des images' },
  { cycle:2, cat:'ae', template:'Bulletin e-sport' },
  { cycle:3, cat:'ar', template:'Focus' },
  { cycle:3, cat:'cl', template:'Lifestyle gaming' },
  { cycle:3, cat:'ar', template:'Le 8ème art' },
];

function loadSchedule() {
  try { const s = localStorage.getItem('editorial_schedule_v4'); return s ? JSON.parse(s) : DEFAULT_SCHEDULE; }
  catch(e) { return DEFAULT_SCHEDULE; }
}
function saveSchedule(s) {
  try { localStorage.setItem('editorial_schedule_v4', JSON.stringify(s)); } catch(e) {}
}

/* ── Dates ── */
let weekOffset = 0;

function getISOWeek(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - y) / 86400000) + 1) / 7);
}

function getWeekBounds(baseDate, offset) {
  const d = new Date(baseDate);
  d.setDate(d.getDate() + offset * 7);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  const mon = new Date(d);
  const sun = new Date(d); sun.setDate(sun.getDate() + 6);
  return { mon, sun };
}

function getMonthBounds(date) {
  return {
    first: new Date(date.getFullYear(), date.getMonth(), 1),
    last:  new Date(date.getFullYear(), date.getMonth() + 1, 0)
  };
}

function fmtDate(dt) { return dt.toLocaleDateString('fr-FR', { day:'numeric', month:'short' }); }
function toISO(dt)   { return dt.toISOString().split('T')[0]; }
function norm(s)     { return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,''); }

function navigate(dir) { weekOffset += dir; loadData(); }

/* ── Config ── */
function saveConfig() {
  const key = document.getElementById('apiKey').value.trim();
  const db  = document.getElementById('dbId').value.trim();
  if (!key || !db) { document.getElementById('setupError').innerHTML = '<div class="error-msg">Remplis les deux champs.</div>'; return; }
  localStorage.setItem('ntn_key', key);
  localStorage.setItem('ntn_db',  db);
  showMain(); loadData();
}

function resetConfig() {
  localStorage.removeItem('ntn_key'); localStorage.removeItem('ntn_db');
  weekOffset = 0;
  document.getElementById('main').style.display  = 'none';
  document.getElementById('setup').style.display = 'flex';
}

function showMain() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display  = 'block';
}

/* ── API Notion ── */
async function queryNotion(key, dbId, filter) {
  const url = PROXY + encodeURIComponent(`https://api.notion.com/v1/databases/${dbId}/query`);
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization':`Bearer ${key}`, 'Notion-Version':'2022-06-28', 'Content-Type':'application/json' },
    body: JSON.stringify(filter)
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||`HTTP ${res.status}`); }
  return res.json();
}

/* ── Helpers propriétés Notion ── */
function getCat(page) {
  const props = page.properties;
  const p = props['Catégorie'] || props['Cat\u00e9gorie'] || props['Category'];
  if (!p) return null;
  const val = (p.select?.name || p.multi_select?.[0]?.name || '');
  if (val === 'Analyse/Review')    return 'ar';
  if (val === 'Culture/Lifestyle') return 'cl';
  if (val === 'Actu/Évènement' || val === 'Actu/Evenement' || val.toLowerCase().includes('actu')) return 'ae';
  return null;
}

function getTemplateName(page) {
  const props = page.properties;
  const p = props['Nom de template'] || props['Template'] || props['template'];
  if (!p) return '';
  if (p.select)       return p.select.name || '';
  if (p.multi_select) return p.multi_select[0]?.name || '';
  if (p.rich_text)    return p.rich_text[0]?.plain_text || '';
  if (p.title)        return p.title[0]?.plain_text || '';
  return '';
}

function getTitle(page) {
  const props = page.properties;
  const p = props['Résumé de la publication'] || props['R\u00e9sum\u00e9 de la publication'] || props['Nom'] || props['Name'] || props['Titre'];
  return p?.title?.[0]?.plain_text || p?.rich_text?.[0]?.plain_text || '';
}

/* ── Chargement données ── */
async function loadData() {
  const key  = localStorage.getItem('ntn_key');
  const dbId = localStorage.getItem('ntn_db');
  if (!key || !dbId) return;

  const schedule = loadSchedule();
  const list = document.getElementById('postsList');
  list.innerHTML = '<div class="loader">Chargement...</div>';

  try {
    const now = new Date();
    const { mon, sun } = getWeekBounds(now, weekOffset);
    const weekNum  = getISOWeek(mon);
    const cycleIdx = (weekNum - 1) % 4;
    const { first, last } = getMonthBounds(mon);

    document.getElementById('weekNum').textContent   = weekNum;
    document.getElementById('dateRange').textContent = `${fmtDate(mon)} – ${fmtDate(sun)}`;
    document.getElementById('currentIndicator').textContent =
      weekOffset === 0 ? '● semaine en cours' : weekOffset > 0 ? `+${weekOffset} sem.` : `${weekOffset} sem.`;

    const [weekData, monthData] = await Promise.all([
      queryNotion(key, dbId, { filter: { and: [
        { property:'Date de publication', date:{ on_or_after:  toISO(mon) } },
        { property:'Date de publication', date:{ on_or_before: toISO(sun) } }
      ]}}),
      queryNotion(key, dbId, { filter: { and: [
        { property:'Date de publication', date:{ on_or_after:  toISO(first) } },
        { property:'Date de publication', date:{ on_or_before: toISO(last)  } }
      ]}})
    ]);

    /* Publications placées cette semaine */
    const placedThisWeek = weekData.results.map(page => ({
      cat:      getCat(page),
      template: norm(getTemplateName(page)),
      title:    getTitle(page)
    }));

    function isMatched(task) {
      return placedThisWeek.some(p => p.cat === task.cat && p.template === norm(task.template));
    }
    function getMatchedTitle(task) {
      const m = placedThisWeek.find(p => p.cat === task.cat && p.template === norm(task.template));
      return m?.title || null;
    }

    /* Rendu semaine — on distribue les jours indicatifs sur les tâches */
    const weekSchedule = schedule.filter(p => p.cycle === cycleIdx);

    if (weekSchedule.length === 0) {
      list.innerHTML = '<div class="no-posts">Aucun post prévu cette semaine</div>';
    } else {
      list.innerHTML = weekSchedule.map((task, i) => {
        const done     = isMatched(task);
        const title    = done ? (getMatchedTitle(task) || task.template) : task.template;
        const hintDay  = HINT_DAYS[i % HINT_DAYS.length];
        const dayLabel = DAYS_SHORT[hintDay];
        return `<div class="post-row ${done ? 'done' : task.cat}">
          <div class="post-day">
            <div class="day-name">${dayLabel}</div>
            <div class="day-hint">indicatif</div>
          </div>
          <div class="post-info">
            <div class="post-template">${title}</div>
            <div class="post-cat">${CAT_LABELS[task.cat]}</div>
          </div>
          <div class="post-status ${done ? 'placed' : ''}">${done ? '✓ Placé' : 'À planifier'}</div>
        </div>`;
      }).join('');
    }

    /* Résumé mensuel */
    const monthlyCounts = { ar:0, cl:0, ae:0 };
    schedule.forEach(p => monthlyCounts[p.cat]++);

    const monthCounts = { ar:0, cl:0, ae:0 };
    monthData.results.forEach(page => { const c = getCat(page); if (c) monthCounts[c]++; });

    document.getElementById('summaryGrid').innerHTML = Object.entries(monthlyCounts).map(([cat, total]) =>
      `<div class="summary-card ${cat}">
        <div class="summary-nums">
          <span class="summary-done">${monthCounts[cat]}</span>
          <span class="summary-total">/ ${total}</span>
        </div>
        <div class="summary-label">${CAT_LABELS[cat]}</div>
      </div>`
    ).join('');

    document.getElementById('lastUpdate').textContent =
      `Mis à jour ${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;

    renderTemplateEditor(schedule);

  } catch(e) {
    list.innerHTML = `<div class="error-msg">Erreur : ${e.message}<br><span style="font-size:10px;opacity:0.7">Vérifie ta clé API et la connexion à la database.</span></div>`;
  }
}

/* ── Éditeur de templates ── */
function toggleEditor() {
  const panel  = document.getElementById('editorPanel');
  const toggle = document.getElementById('editorToggle');
  const open   = panel.classList.toggle('visible');
  toggle.classList.toggle('open', open);
  if (open) renderTemplateEditor(loadSchedule());
}

function renderTemplateEditor(schedule) {
  const container = document.getElementById('tplRows');
  container.innerHTML = schedule.map((t, i) => `
    <div class="tpl-row" id="trow-${i}" style="margin-bottom:5px;">
      <input class="tpl-input" value="${t.template}" onchange="updateTpl(${i},'template',this.value)" />
      <select class="tpl-select" onchange="updateTpl(${i},'cat',this.value)">
        <option value="ar" ${t.cat==='ar'?'selected':''}>Analyse/Review</option>
        <option value="cl" ${t.cat==='cl'?'selected':''}>Culture/Lifestyle</option>
        <option value="ae" ${t.cat==='ae'?'selected':''}>Actu/Évènement</option>
      </select>
      <select class="tpl-select" onchange="updateTpl(${i},'cycle',parseInt(this.value))">
        <option value="0" ${t.cycle===0?'selected':''}>Sem. A</option>
        <option value="1" ${t.cycle===1?'selected':''}>Sem. B</option>
        <option value="2" ${t.cycle===2?'selected':''}>Sem. C</option>
        <option value="3" ${t.cycle===3?'selected':''}>Sem. D</option>
      </select>
      <button class="tpl-del" onclick="deleteTpl(${i})">×</button>
    </div>
  `).join('');
}

function updateTpl(i, field, val) {
  const s = loadSchedule();
  s[i][field] = val;
  saveSchedule(s);
  renderTemplateEditor(s);
  loadData();
}

function deleteTpl(i) {
  const s = loadSchedule();
  s.splice(i, 1);
  saveSchedule(s);
  renderTemplateEditor(s);
  loadData();
}

function addTemplate() {
  const s = loadSchedule();
  s.push({ cycle:0, cat:'ar', template:'Nouveau template' });
  saveSchedule(s);
  renderTemplateEditor(s);
  loadData();
}

function resetTemplates() {
  if (!confirm('Réinitialiser tous les templates au modèle par défaut ?')) return;
  localStorage.removeItem('editorial_schedule_v4');
  renderTemplateEditor(loadSchedule());
  loadData();
}

/* ── Init ── */
const savedKey = localStorage.getItem('ntn_key');
const savedDb  = localStorage.getItem('ntn_db');
if (savedKey && savedDb) { showMain(); loadData(); }
</script>
</body>
</html>
