<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial Widget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0f0f0f;
    --surface2: #1e1e1e;
    --border:   #2a2a2a;
    --text:     #f0ede8;
    --muted:    #666;
    --faint:    #2a2a2a;
    --ok:       #52c98a;
    --ok-bg:    #0e2118;
    --ok-border:#1a3a28;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); padding: 22px; font-size: 14px; }

  /* ── Setup ── */
  .setup { display: flex; flex-direction: column; gap: 12px; }
  .setup-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  input[type=text], input[type=password], input[type=number] {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 8px 12px; outline: none; transition: border-color 0.15s; width: 100%;
  }
  input:focus { border-color: var(--muted); }
  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; }
  .btn {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em;
    padding: 8px 14px; border-radius: 5px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    transition: background 0.15s; white-space: nowrap;
  }
  .btn:hover { background: #333; }
  .btn-sm { padding: 5px 10px; font-size: 10px; }
  .btn-danger { color: #e07070; border-color: #3a1818; }
  .btn-danger:hover { background: #1f1010; }
  .hint { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .error-msg { background: #1f1010; border: 1px solid #3a1818; border-radius: 5px; padding: 10px 12px; font-size: 12px; color: #e07070; line-height: 1.5; }

  /* ── Main ── */
  .main { display: none; }

  .header { display: grid; grid-template-columns: 48px 1fr 48px; align-items: center; margin-bottom: 20px; gap: 4px; }
  .nav-btn { font-size: 32px; font-weight: 300; color: var(--muted); background: none; border: none; cursor: pointer; padding: 4px; line-height: 1; transition: color 0.15s, background 0.15s; text-align: center; border-radius: 6px; }
  .nav-btn:hover { color: var(--text); background: var(--surface2); }
  .nav-btn:disabled { color: var(--faint); cursor: default; background: none; }
  .week-info { text-align: center; }
  .week-number { font-family: var(--mono); font-size: 22px; font-weight: 500; line-height: 1; }
  .week-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; }
  .week-current { font-family: var(--mono); font-size: 10px; color: var(--ok); margin-top: 3px; }

  .section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  /* Posts */
  .posts-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 18px; }
  .post-row { display: grid; grid-template-columns: 56px 1fr auto; align-items: center; gap: 8px; padding: 9px 11px; border-radius: 6px; border: 1px solid transparent; }
  .post-row.done { background: var(--ok-bg); border-color: var(--ok-border); opacity: 0.55; }
  .post-day { font-family: var(--mono); font-size: 10px; color: var(--muted); line-height: 1.4; }
  .post-day .day-name { font-size: 11px; color: var(--text); opacity: 0.5; }
  .post-day .day-hint { font-size: 9px; opacity: 0.35; }
  .post-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .post-template { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .done .post-template { color: var(--ok); text-decoration: line-through; }
  .post-cat { font-size: 11px; color: var(--muted); }
  .post-status { font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; }
  .post-status.placed { color: var(--ok); }

  /* Summary */
  .divider { height: 1px; background: var(--border); margin: 14px 0; }
  .summary-grid { display: grid; gap: 7px; margin-bottom: 14px; }
  .summary-card { padding: 9px 10px; border-radius: 5px; border: 1px solid; }
  .summary-nums { display: flex; align-items: baseline; gap: 3px; margin-bottom: 3px; }
  .summary-done  { font-family: var(--mono); font-size: 17px; font-weight: 500; }
  .summary-total { font-family: var(--mono); font-size: 11px; }
  .summary-label { font-size: 10px; line-height: 1.3; }

  /* Footer */
  .footer { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .refresh-btn { font-family: var(--mono); font-size: 10px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0; transition: color 0.15s; }
  .refresh-btn:hover { color: var(--text); }
  .last-update { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .reset-btn { font-family: var(--mono); font-size: 10px; color: #444; background: none; border: none; cursor: pointer; padding: 0; }
  .reset-btn:hover { color: #e07070; }

  /* ── Panneau personnalisation ── */
  .perso-section { border-top: 1px solid var(--border); padding-top: 14px; }
  .perso-toggle {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 6px; padding: 0; transition: color 0.15s; width: 100%;
  }
  .perso-toggle:hover { color: var(--text); }
  .perso-toggle .arrow { transition: transform 0.2s; display: inline-block; }
  .perso-toggle.open .arrow { transform: rotate(90deg); }
  .perso-panel { display: none; margin-top: 16px; flex-direction: column; gap: 20px; }
  .perso-panel.visible { display: flex; }

  /* Sous-sections */
  .perso-block-title {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }

  /* Grille templates */
  .tpl-header { display: grid; grid-template-columns: 1fr 130px 28px; gap: 6px; margin-bottom: 5px; }
  .tpl-header-label { font-family: var(--mono); font-size: 9px; color: var(--muted); padding-left: 2px; }
  .tpl-row { display: grid; grid-template-columns: 1fr 130px 28px; gap: 6px; margin-bottom: 5px; align-items: center; }
  .tpl-input {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: var(--sans); font-size: 12px;
    padding: 5px 8px; outline: none; width: 100%; transition: border-color 0.15s;
  }
  .tpl-input:focus { border-color: var(--muted); }
  .tpl-select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: var(--mono); font-size: 10px;
    padding: 5px 6px; outline: none; width: 100%;
  }
  .tpl-del { background: none; border: 1px solid var(--border); border-radius: 4px; color: #555; font-size: 14px; cursor: pointer; padding: 3px 6px; transition: color 0.15s, border-color 0.15s; line-height: 1; }
  .tpl-del:hover { color: #e07070; border-color: #5a2020; }

  /* Grille catégories */
  .cat-header { display: grid; grid-template-columns: 1fr 80px 60px 28px; gap: 6px; margin-bottom: 5px; }
  .cat-row    { display: grid; grid-template-columns: 1fr 80px 60px 28px; gap: 6px; margin-bottom: 5px; align-items: center; }
  .cat-label  { font-family: var(--mono); font-size: 9px; color: var(--muted); padding-left: 2px; }
  input[type=color] {
    width: 100%; height: 30px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--surface2); cursor: pointer; padding: 2px 3px;
  }
  input[type=number] { padding: 5px 8px; }

  .perso-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
</style>
</head>
<body>

<!-- Setup -->
<div class="setup" id="setup">
  <div class="setup-title">Configuration</div>
  <div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Clé API Notion</div>
    <input type="password" id="apiKey" placeholder="ntn_..." />
  </div>
  <div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Database ID</div>
    <div class="input-row">
      <input type="text" id="dbId" placeholder="f35b96bf..." />
      <button class="btn" onclick="saveConfig()">Connecter</button>
    </div>
  </div>
  <div class="hint">Stocké uniquement dans ton navigateur.</div>
  <div id="setupError"></div>
</div>

<!-- Main -->
<div class="main" id="main">

  <div class="header">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">‹</button>
    <div class="week-info">
      <div class="week-number">Sem. <span id="weekNum">—</span></div>
      <div class="week-sub" id="dateRange">—</div>
      <div class="week-current" id="currentIndicator"></div>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">›</button>
  </div>

  <div class="section-label">Publications prévues</div>
  <div id="postsList" class="posts-list"></div>

  <div class="divider"></div>

  <div class="section-label" style="margin-bottom:8px;">Ce mois — avancement</div>
  <div class="summary-grid" id="summaryGrid" style="grid-template-columns: repeat(3,1fr)"></div>

  <div class="footer">
    <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
    <span class="last-update" id="lastUpdate"></span>
    <button class="reset-btn" onclick="resetConfig()">Déconnecter</button>
  </div>

  <!-- Personnalisation -->
  <div class="perso-section">
    <button class="perso-toggle" id="persoToggle" onclick="togglePerso()">
      <span class="arrow">▶</span> Personnalisation
    </button>
    <div class="perso-panel" id="persoPanel">

      <!-- Bloc catégories -->
      <div>
        <div class="perso-block-title">Catégories</div>
        <div class="cat-header">
          <div class="cat-label">NOM (= valeur exacte Notion)</div>
          <div class="cat-label">COULEUR</div>
          <div class="cat-label">CIBLE/MOIS</div>
          <div></div>
        </div>
        <div id="catRows"></div>
        <div class="perso-actions">
          <button class="btn btn-sm" onclick="addCat()">+ Catégorie</button>
        </div>
      </div>

      <!-- Bloc templates -->
      <div>
        <div class="perso-block-title">Templates de la semaine type</div>
        <div class="tpl-header">
          <div class="tpl-header-label">NOM DU TEMPLATE</div>
          <div class="tpl-header-label">CATÉGORIE</div>
          <div></div>
        </div>
        <div id="tplRows"></div>
        <div class="perso-actions">
          <button class="btn btn-sm" onclick="addTpl()">+ Template</button>
          <button class="btn btn-sm btn-danger" onclick="resetAll()">Réinitialiser tout</button>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
const PROXY = 'https://corsproxy.io/?url=';
const HINT_DAYS  = [1, 3, 5]; // MAR, JEU, SAM
const DAYS_SHORT = ['LUN','MAR','MER','JEU','VEN','SAM','DIM'];

/* ── Données par défaut ── */
const DEFAULT_CATS = [
  { id:'ar', name:'Analyse/Review',    color:'#9b8fce', target:7 },
  { id:'cl', name:'Culture/Lifestyle', color:'#e07950', target:3 },
  { id:'ae', name:'Actu/Évènement',    color:'#5b9bd5', target:2 },
];

const DEFAULT_SCHEDULE = [
  { cat:'ar', template:'Focus' },
  { cat:'ar', template:'Le 8ème art' },
  { cat:'cl', template:'Lifestyle gaming' },
  { cat:'ar', template:'Analyse statistique' },
  { cat:'ae', template:'Évènement' },
  { cat:'cl', template:'Reco culturelle' },
  { cat:'ar', template:'Review' },
  { cat:'ar', template:'Le pouvoir des images' },
  { cat:'ae', template:'Bulletin e-sport' },
  { cat:'ar', template:'Focus' },
  { cat:'cl', template:'Lifestyle gaming' },
  { cat:'ar', template:'Le 8ème art' },
];

/* ── Persistance ── */
function loadCats()     { try { const s = localStorage.getItem('ed_cats_v5');     return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_CATS));     } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_CATS));     } }
function loadSchedule() { try { const s = localStorage.getItem('ed_schedule_v5'); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_SCHEDULE)); } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_SCHEDULE)); } }
function saveCats(c)     { try { localStorage.setItem('ed_cats_v5',     JSON.stringify(c)); } catch(e) {} }
function saveSchedule(s) { try { localStorage.setItem('ed_schedule_v5', JSON.stringify(s)); } catch(e) {} }

/* ── Couleurs dynamiques ── */
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}
function catStyles(color) {
  const { r, g, b } = hexToRgb(color);
  return {
    bg:     `rgba(${r},${g},${b},0.08)`,
    border: `rgba(${r},${g},${b},0.25)`,
    text:   color,
  };
}

/* ── Dates ── */
let weekOffset = 0;

function getISOWeek(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - y) / 86400000) + 1) / 7);
}

function getWeekBounds(baseDate, offset) {
  const d = new Date(baseDate);
  d.setDate(d.getDate() + offset * 7);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  const mon = new Date(d);
  const sun = new Date(d); sun.setDate(sun.getDate() + 6);
  return { mon, sun };
}

function getMonthBounds(date) {
  return {
    first: new Date(date.getFullYear(), date.getMonth(), 1),
    last:  new Date(date.getFullYear(), date.getMonth() + 1, 0)
  };
}

function fmtDate(dt) { return dt.toLocaleDateString('fr-FR', { day:'numeric', month:'short' }); }
function toISO(dt)   { return dt.toISOString().split('T')[0]; }
function norm(s)     { return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,''); }

function navigate(dir) { weekOffset += dir; loadData(); }

/* ── Config ── */
function saveConfig() {
  const key = document.getElementById('apiKey').value.trim();
  const db  = document.getElementById('dbId').value.trim();
  if (!key || !db) { document.getElementById('setupError').innerHTML = '<div class="error-msg">Remplis les deux champs.</div>'; return; }
  localStorage.setItem('ntn_key', key);
  localStorage.setItem('ntn_db',  db);
  showMain(); loadData();
}

function resetConfig() {
  localStorage.removeItem('ntn_key'); localStorage.removeItem('ntn_db');
  weekOffset = 0;
  document.getElementById('main').style.display  = 'none';
  document.getElementById('setup').style.display = 'flex';
}

function showMain() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display  = 'block';
}

/* ── API Notion ── */
async function queryNotion(key, dbId, filter) {
  const url = PROXY + encodeURIComponent(`https://api.notion.com/v1/databases/${dbId}/query`);
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization':`Bearer ${key}`, 'Notion-Version':'2022-06-28', 'Content-Type':'application/json' },
    body: JSON.stringify(filter)
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||`HTTP ${res.status}`); }
  return res.json();
}

/* ── Helpers Notion ── */
function getCatIdFromPage(page, cats) {
  const props = page.properties;
  const p = props['Catégorie'] || props['Cat\u00e9gorie'] || props['Category'];
  if (!p) return null;
  const val = (p.select?.name || p.multi_select?.[0]?.name || '');
  const match = cats.find(c => norm(c.name) === norm(val));
  return match ? match.id : null;
}

function getTemplateName(page) {
  const props = page.properties;
  const p = props['Nom de template'] || props['Template'] || props['template'];
  if (!p) return '';
  if (p.select)       return p.select.name || '';
  if (p.multi_select) return p.multi_select[0]?.name || '';
  if (p.rich_text)    return p.rich_text[0]?.plain_text || '';
  if (p.title)        return p.title[0]?.plain_text || '';
  return '';
}

function getTitle(page) {
  const props = page.properties;
  const p = props['Résumé de la publication'] || props['R\u00e9sum\u00e9 de la publication'] || props['Nom'] || props['Name'] || props['Titre'];
  return p?.title?.[0]?.plain_text || p?.rich_text?.[0]?.plain_text || '';
}

/* ── Chargement données ── */
async function loadData() {
  const key  = localStorage.getItem('ntn_key');
  const dbId = localStorage.getItem('ntn_db');
  if (!key || !dbId) return;

  const cats     = loadCats();
  const schedule = loadSchedule();
  const list     = document.getElementById('postsList');
  list.innerHTML = '<div style="text-align:center;padding:28px;font-family:var(--mono);font-size:11px;color:var(--muted);">Chargement...</div>';

  try {
    const now = new Date();
    const { mon, sun } = getWeekBounds(now, weekOffset);
    const weekNum  = getISOWeek(mon);
    const cycleIdx = (weekNum - 1) % 4;
    const { first, last } = getMonthBounds(mon);

    document.getElementById('weekNum').textContent   = weekNum;
    document.getElementById('dateRange').textContent = `${fmtDate(mon)} – ${fmtDate(sun)}`;
    document.getElementById('currentIndicator').textContent =
      weekOffset === 0 ? '● semaine en cours' : weekOffset > 0 ? `+${weekOffset} sem.` : `${weekOffset} sem.`;

    const [weekData, monthData] = await Promise.all([
      queryNotion(key, dbId, { filter: { and: [
        { property:'Date de publication', date:{ on_or_after:  toISO(mon) } },
        { property:'Date de publication', date:{ on_or_before: toISO(sun) } }
      ]}}),
      queryNotion(key, dbId, { filter: { and: [
        { property:'Date de publication', date:{ on_or_after:  toISO(first) } },
        { property:'Date de publication', date:{ on_or_before: toISO(last)  } }
      ]}})
    ]);

    /* Publications placées cette semaine */
    const placedThisWeek = weekData.results.map(page => ({
      catId:    getCatIdFromPage(page, cats),
      template: norm(getTemplateName(page)),
      title:    getTitle(page)
    }));

    function isMatched(task) {
      return placedThisWeek.some(p => p.catId === task.cat && p.template === norm(task.template));
    }
    function getMatchedTitle(task) {
      const m = placedThisWeek.find(p => p.catId === task.cat && p.template === norm(task.template));
      return m?.title || null;
    }

    /* Tâches de cette semaine selon cycle */
    const posInCycle = cycleIdx; // 0-3
    const tasksPerCycle = Math.ceil(schedule.length / 4);
    const startIdx = posInCycle * tasksPerCycle;
    const weekSchedule = schedule.slice(startIdx, startIdx + tasksPerCycle);

    const catMap = Object.fromEntries(cats.map(c => [c.id, c]));

    /* Rendu posts */
    if (weekSchedule.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:18px;font-family:var(--mono);font-size:11px;color:var(--muted);">Aucun post prévu cette semaine</div>';
    } else {
      list.innerHTML = weekSchedule.map((task, i) => {
        const done     = isMatched(task);
        const title    = done ? (getMatchedTitle(task) || task.template) : task.template;
        const hintDay  = HINT_DAYS[i % HINT_DAYS.length];
        const cat      = catMap[task.cat];
        const styles   = cat ? catStyles(cat.color) : { bg:'var(--surface2)', border:'var(--border)', text:'var(--text)' };
        const catLabel = cat ? cat.name : task.cat;
        return `<div class="post-row ${done ? 'done' : ''}" style="${done ? '' : `background:${styles.bg};border-color:${styles.border};`}">
          <div class="post-day">
            <div class="day-name">${DAYS_SHORT[hintDay]}</div>
            <div class="day-hint">indicatif</div>
          </div>
          <div class="post-info">
            <div class="post-template" style="${done ? '' : `color:${styles.text};`}">${title}</div>
            <div class="post-cat">${catLabel}</div>
          </div>
          <div class="post-status ${done ? 'placed' : ''}">${done ? '✓ Placé' : 'À planifier'}</div>
        </div>`;
      }).join('');
    }

    /* Résumé mensuel dynamique */
    const monthCounts = {};
    cats.forEach(c => monthCounts[c.id] = 0);
    monthData.results.forEach(page => {
      const id = getCatIdFromPage(page, cats);
      if (id && monthCounts[id] !== undefined) monthCounts[id]++;
    });

    const cols = Math.min(cats.length, 3);
    document.getElementById('summaryGrid').style.gridTemplateColumns = `repeat(${cols},1fr)`;
    document.getElementById('summaryGrid').innerHTML = cats.map(cat => {
      const styles = catStyles(cat.color);
      return `<div class="summary-card" style="background:${styles.bg};border-color:${styles.border};">
        <div class="summary-nums">
          <span class="summary-done" style="color:${styles.text};">${monthCounts[cat.id]}</span>
          <span class="summary-total" style="color:${styles.text};opacity:0.5;">/ ${cat.target}</span>
        </div>
        <div class="summary-label" style="color:var(--muted);">${cat.name}</div>
      </div>`;
    }).join('');

    document.getElementById('lastUpdate').textContent =
      `Mis à jour ${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;

  } catch(e) {
    list.innerHTML = `<div class="error-msg">Erreur : ${e.message}<br><span style="font-size:10px;opacity:0.7">Vérifie ta clé API et la connexion à la database.</span></div>`;
  }
}

/* ── Panneau personnalisation ── */
function togglePerso() {
  const panel  = document.getElementById('persoPanel');
  const toggle = document.getElementById('persoToggle');
  const open   = panel.classList.toggle('visible');
  toggle.classList.toggle('open', open);
  if (open) renderPerso();
}

function renderPerso() {
  renderCatRows(loadCats());
  renderTplRows(loadSchedule(), loadCats());
}

/* Catégories */
function renderCatRows(cats) {
  document.getElementById('catRows').innerHTML = cats.map((c, i) => `
    <div class="cat-row">
      <input class="tpl-input" value="${c.name}" onchange="updateCat(${i},'name',this.value)" placeholder="Nom exact Notion" />
      <input type="color" value="${c.color}" onchange="updateCat(${i},'color',this.value)" title="Couleur" />
      <input type="number" value="${c.target}" min="1" max="99" onchange="updateCat(${i},'target',parseInt(this.value))" style="width:100%;padding:5px 8px;" />
      <button class="tpl-del" onclick="deleteCat(${i})">×</button>
    </div>
  `).join('');
}

function updateCat(i, field, val) {
  const cats = loadCats();
  cats[i][field] = val;
  saveCats(cats);
  renderCatRows(cats);
  renderTplRows(loadSchedule(), cats);
  loadData();
}

function deleteCat(i) {
  const cats = loadCats();
  const removed = cats[i].id;
  cats.splice(i, 1);
  saveCats(cats);
  const schedule = loadSchedule().filter(t => t.cat !== removed);
  saveSchedule(schedule);
  renderPerso();
  loadData();
}

function addCat() {
  const cats = loadCats();
  const newId = 'cat_' + Date.now();
  cats.push({ id: newId, name: 'Nouvelle catégorie', color: '#888888', target: 1 });
  saveCats(cats);
  renderCatRows(cats);
  renderTplRows(loadSchedule(), cats);
}

/* Templates */
function renderTplRows(schedule, cats) {
  const container = document.getElementById('tplRows');
  container.innerHTML = schedule.map((t, i) => {
    const options = cats.map(c =>
      `<option value="${c.id}" ${t.cat === c.id ? 'selected' : ''}>${c.name}</option>`
    ).join('');
    return `<div class="tpl-row">
      <input class="tpl-input" value="${t.template}" onchange="updateTpl(${i},'template',this.value)" />
      <select class="tpl-select" onchange="updateTpl(${i},'cat',this.value)">${options}</select>
      <button class="tpl-del" onclick="deleteTpl(${i})">×</button>
    </div>`;
  }).join('');
}

function updateTpl(i, field, val) {
  const s = loadSchedule();
  s[i][field] = val;
  saveSchedule(s);
  renderTplRows(s, loadCats());
  loadData();
}

function deleteTpl(i) {
  const s = loadSchedule();
  s.splice(i, 1);
  saveSchedule(s);
  renderTplRows(s, loadCats());
  loadData();
}

function addTpl() {
  const s    = loadSchedule();
  const cats = loadCats();
  s.push({ cat: cats[0]?.id || 'ar', template: 'Nouveau template' });
  saveSchedule(s);
  renderTplRows(s, cats);
  loadData();
}

function resetAll() {
  if (!confirm('Réinitialiser catégories et templates par défaut ?')) return;
  localStorage.removeItem('ed_cats_v5');
  localStorage.removeItem('ed_schedule_v5');
  renderPerso();
  loadData();
}

/* ── Init ── */
const savedKey = localStorage.getItem('ntn_key');
const savedDb  = localStorage.getItem('ntn_db');
if (savedKey && savedDb) { showMain(); loadData(); }
</script>
</body>
</html>
