<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-do quotidienne</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #111111;
    color: #e8e8e8;
    padding: 28px 28px 32px;
    min-height: 100vh;
  }

  #header {
    margin-bottom: 6px;
    padding-bottom: 8px;
  }

  #title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: #f0f0f0;
    letter-spacing: -0.01em;
    margin-bottom: 5px;
  }

  #subtitle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #date-display {
    font-size: 12px;
    font-weight: 300;
    color: #666;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  #progress-label {
    font-size: 11px;
    color: #444;
    font-weight: 400;
  }

  #progress-bar-track {
    height: 1.5px;
    background: #222;
    margin-top: 8px;
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-bar-fill {
    height: 100%;
    background: #c8b89a;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  #task-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 7px 12px;
    border-radius: 6px;
    border: 0.5px solid transparent;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    user-select: none;
  }

  .task-row:hover {
    background: #1a1a1a;
    border-color: #2a2a2a;
  }

  .task-row.done {
    opacity: 0.45;
  }

  .checkbox {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: 1px solid #3a3a3a;
    background: transparent;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .checkbox.checked {
    background: #c8b89a;
    border-color: #c8b89a;
  }

  .checkmark { display: none; }
  .checkbox.checked .checkmark { display: block; }

  .task-label {
    font-size: 14px;
    font-weight: 300;
    color: #d0d0d0;
    flex: 1;
    line-height: 1.4;
    letter-spacing: 0.01em;
  }

  .task-label.done-text {
    text-decoration: line-through;
    color: #444;
  }

  #footer {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 0.5px solid #1e1e1e;
  }

  button {
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    letter-spacing: 0.04em;
    padding: 5px 14px;
    border-radius: 4px;
    border: 0.5px solid #2e2e2e;
    background: transparent;
    color: #555;
    cursor: pointer;
    transition: all 0.12s;
    text-transform: uppercase;
  }

  button:hover {
    background: #1e1e1e;
    color: #888;
    border-color: #3a3a3a;
  }

  #edit-panel {
    display: none;
    margin-top: 20px;
    border-top: 0.5px solid #1e1e1e;
    padding-top: 18px;
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #edit-panel.visible { display: block; }

  .edit-section-label {
    font-size: 10px;
    color: #444;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  #task-count-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  #task-count-row span {
    font-size: 12px;
    color: #555;
    font-weight: 300;
  }

  #task-count {
    width: 52px;
    padding: 5px 9px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    border: 0.5px solid #2e2e2e;
    border-radius: 4px;
    background: #161616;
    color: #d0d0d0;
  }

  #task-count:focus { outline: none; border-color: #c8b89a; }

  #task-inputs {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .task-input-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .task-num {
    font-size: 10px;
    color: #333;
    width: 14px;
    flex-shrink: 0;
    text-align: right;
  }

  .task-input {
    flex: 1;
    padding: 7px 11px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    border: 0.5px solid #2a2a2a;
    border-radius: 4px;
    background: #161616;
    color: #d0d0d0;
    transition: border-color 0.12s;
  }

  .task-input:focus { outline: none; border-color: #c8b89a; }
  .task-input::placeholder { color: #333; }

  #save-btn {
    background: #c8b89a;
    color: #111;
    border-color: #c8b89a;
    font-weight: 500;
    padding: 6px 18px;
  }

  #save-btn:hover {
    background: #d4c7ae;
    border-color: #d4c7ae;
    color: #111;
  }
</style>
</head>
<body>

<div id="header">
  <div id="title">To-do liste quotidienne</div>
  <div id="subtitle-row">
    <span id="date-display"></span>
    <span id="progress-label"></span>
  </div>
  <div id="progress-bar-track">
    <div id="progress-bar-fill" style="width:0%"></div>
  </div>
</div>

<div id="task-list"></div>

<div id="footer">
  <button onclick="resetAll()">Réinitialiser</button>
  <button onclick="toggleEdit()">Modifier les tâches</button>
</div>

<div id="edit-panel">
  <div class="edit-section-label">Personnalisation</div>
  <div id="task-count-row">
    <span>Nombre de tâches</span>
    <input type="number" id="task-count" min="1" max="15" value="6" oninput="updateInputCount()">
  </div>
  <div id="task-inputs"></div>
  <button id="save-btn" onclick="saveConfig()">Enregistrer</button>
</div>

<script>
const DEFAULT_TASKS = ["Tâche 1","Tâche 2","Tâche 3","Tâche 4","Tâche 5","Tâche 6"];
const STORAGE_KEY = "daily_todo_v3";

function getTodayStr() {
  const d = new Date();
  if (d.getHours() < 7) d.setDate(d.getDate() - 1);
  return d.getFullYear() + "-" + d.getMonth() + "-" + d.getDate();
}

function formatDate(d) {
  const days = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
  const months = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
  return days[d.getDay()] + " " + d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
}

function load() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; }
  catch(e) { return null; }
}

function save(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

let state;

function init() {
  const stored = load();
  const today = getTodayStr();
  if (stored) {
    const tasks = stored.tasks || DEFAULT_TASKS;
    const checks = stored.dateKey === today
      ? (stored.checks || new Array(tasks.length).fill(false))
      : new Array(tasks.length).fill(false);
    state = { tasks, checks, dateKey: today };
  } else {
    state = { tasks: [...DEFAULT_TASKS], checks: new Array(6).fill(false), dateKey: today };
  }
  save(state);
  render();
}

function render() {
  const d = new Date();
  document.getElementById("date-display").textContent = formatDate(d);

  const done = state.checks.filter(Boolean).length;
  const total = state.tasks.length;
  document.getElementById("progress-label").textContent = done + " / " + total;
  document.getElementById("progress-bar-fill").style.width = (total > 0 ? Math.round(done/total*100) : 0) + "%";

  const list = document.getElementById("task-list");
  list.innerHTML = "";

  state.tasks.forEach((task, i) => {
    const row = document.createElement("div");
    row.className = "task-row" + (state.checks[i] ? " done" : "");

    const cb = document.createElement("div");
    cb.className = "checkbox" + (state.checks[i] ? " checked" : "");
    cb.innerHTML = '<svg class="checkmark" width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.2 5.8L8 1" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    const label = document.createElement("span");
    label.className = "task-label" + (state.checks[i] ? " done-text" : "");
    label.textContent = task;

    row.appendChild(cb);
    row.appendChild(label);
    row.addEventListener("click", () => {
      state.checks[i] = !state.checks[i];
      save(state);
      render();
    });
    list.appendChild(row);
  });
}

function resetAll() {
  state.checks = new Array(state.tasks.length).fill(false);
  save(state);
  render();
}

let editOpen = false;

function toggleEdit() {
  editOpen = !editOpen;
  document.getElementById("edit-panel").className = editOpen ? "visible" : "";
  if (editOpen) {
    document.getElementById("task-count").value = state.tasks.length;
    buildInputs(state.tasks);
  }
}

function buildInputs(tasks) {
  const container = document.getElementById("task-inputs");
  container.innerHTML = "";
  tasks.forEach((task, i) => {
    const row = document.createElement("div");
    row.className = "task-input-row";
    const num = document.createElement("span");
    num.className = "task-num";
    num.textContent = i + 1;
    const input = document.createElement("input");
    input.className = "task-input";
    input.type = "text";
    input.value = task;
    input.placeholder = "Tâche " + (i + 1);
    row.appendChild(num);
    row.appendChild(input);
    container.appendChild(row);
  });
}

function updateInputCount() {
  const n = Math.max(1, Math.min(15, parseInt(document.getElementById("task-count").value) || 1));
  const inputs = document.querySelectorAll(".task-input");
  const current = Array.from(inputs).map(i => i.value);
  const newTasks = [];
  for (let i = 0; i < n; i++) newTasks.push(current[i] || "Tâche " + (i + 1));
  buildInputs(newTasks);
}

function saveConfig() {
  const inputs = document.querySelectorAll(".task-input");
  const newTasks = Array.from(inputs).map(i => i.value.trim() || "Tâche sans nom");
  state.tasks = newTasks;
  state.checks = new Array(newTasks.length).fill(false);
  save(state);
  render();
  toggleEdit();
}

setInterval(() => {
  const today = getTodayStr();
  if (state.dateKey !== today) {
    state.dateKey = today;
    state.checks = new Array(state.tasks.length).fill(false);
    save(state);
    render();
  }
}, 30000);

init();
</script>
</body>
</html>
