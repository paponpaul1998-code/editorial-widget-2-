<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Todo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    padding: 20px 24px 28px;
    min-height: 100vh;
  }

  #header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  #date-display {
    font-size: 17px;
    font-weight: 500;
    color: #1a1a1a;
    text-transform: capitalize;
  }

  #progress-label {
    font-size: 12px;
    color: #888;
  }

  #task-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .task-row {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 9px 12px;
    border-radius: 7px;
    border: 0.5px solid #e5e5e5;
    background: #fff;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }

  .task-row:hover { background: #f9f9f9; }
  .task-row.done { background: #f5f5f5; border-color: #e0e0e0; }

  .checkbox {
    width: 17px;
    height: 17px;
    border-radius: 4px;
    border: 1.5px solid #ccc;
    background: transparent;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
  }

  .checkbox.checked {
    background: #4a90d9;
    border-color: #4a90d9;
  }

  .checkmark {
    display: none;
  }
  .checkbox.checked .checkmark { display: block; }

  .task-label {
    font-size: 14px;
    color: #1a1a1a;
    flex: 1;
    line-height: 1.4;
  }
  .task-label.done-text {
    text-decoration: line-through;
    color: #aaa;
  }

  #footer {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    align-items: center;
  }

  button {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 0.5px solid #ddd;
    background: transparent;
    color: #555;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.1s;
  }
  button:hover { background: #f0f0f0; }

  #edit-panel {
    display: none;
    margin-top: 18px;
    border-top: 0.5px solid #e5e5e5;
    padding-top: 16px;
  }

  #edit-panel.visible { display: block; }

  .edit-label {
    font-size: 11px;
    color: #888;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }

  #task-count-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  #task-count-row span {
    font-size: 12px;
    color: #666;
  }

  #task-count {
    width: 50px;
    padding: 5px 8px;
    font-size: 13px;
    border: 0.5px solid #ddd;
    border-radius: 6px;
    font-family: inherit;
    color: #1a1a1a;
  }

  #task-inputs {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }

  .task-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .task-num {
    font-size: 11px;
    color: #bbb;
    width: 14px;
    flex-shrink: 0;
    text-align: right;
  }

  .task-input {
    flex: 1;
    padding: 6px 10px;
    font-size: 13px;
    border: 0.5px solid #ddd;
    border-radius: 6px;
    font-family: inherit;
    color: #1a1a1a;
    background: #fff;
  }

  .task-input:focus {
    outline: none;
    border-color: #4a90d9;
  }

  #save-btn {
    background: #1a1a1a;
    color: #fff;
    border-color: #1a1a1a;
    padding: 6px 16px;
  }
  #save-btn:hover { background: #333; }
</style>
</head>
<body>

<div id="header">
  <span id="date-display"></span>
  <span id="progress-label"></span>
</div>

<div id="task-list"></div>

<div id="footer">
  <button onclick="resetAll()">Réinitialiser</button>
  <button onclick="toggleEdit()">Modifier les tâches</button>
</div>

<div id="edit-panel">
  <div class="edit-label">Personnalisation</div>

  <div id="task-count-row">
    <span>Nombre de tâches :</span>
    <input type="number" id="task-count" min="1" max="15" value="6" oninput="updateInputCount()">
  </div>

  <div id="task-inputs"></div>

  <button id="save-btn" onclick="saveConfig()">Enregistrer</button>
</div>

<script>
const DEFAULT_TASKS = ["Tâche 1","Tâche 2","Tâche 3","Tâche 4","Tâche 5","Tâche 6"];
const STORAGE_KEY = "daily_todo_v2";

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function formatDate(d) {
  const days = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
  const months = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
  const day = days[d.getDay()];
  const month = months[d.getMonth()];
  return day.charAt(0).toUpperCase() + day.slice(1) + " " + d.getDate() + " " + month + " " + d.getFullYear();
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function save(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

let state;

function init() {
  const stored = load();
  const today = getTodayStr();

  if (stored) {
    const tasks = stored.tasks || DEFAULT_TASKS;
    const checks = stored.dateKey === today
      ? (stored.checks || new Array(tasks.length).fill(false))
      : new Array(tasks.length).fill(false);
    state = { tasks, checks, dateKey: today };
  } else {
    state = { tasks: [...DEFAULT_TASKS], checks: new Array(6).fill(false), dateKey: today };
  }

  save(state);
  render();
}

function render() {
  document.getElementById("date-display").textContent = formatDate(new Date());

  const done = state.checks.filter(Boolean).length;
  const total = state.tasks.length;
  document.getElementById("progress-label").textContent = done + "/" + total;

  const list = document.getElementById("task-list");
  list.innerHTML = "";

  state.tasks.forEach((task, i) => {
    const row = document.createElement("div");
    row.className = "task-row" + (state.checks[i] ? " done" : "");

    const cb = document.createElement("div");
    cb.className = "checkbox" + (state.checks[i] ? " checked" : "");
    cb.innerHTML = '<svg class="checkmark" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    const label = document.createElement("span");
    label.className = "task-label" + (state.checks[i] ? " done-text" : "");
    label.textContent = task;

    row.appendChild(cb);
    row.appendChild(label);
    row.addEventListener("click", () => {
      state.checks[i] = !state.checks[i];
      save(state);
      render();
    });

    list.appendChild(row);
  });
}

function resetAll() {
  state.checks = new Array(state.tasks.length).fill(false);
  save(state);
  render();
}

let editOpen = false;

function toggleEdit() {
  editOpen = !editOpen;
  const panel = document.getElementById("edit-panel");
  panel.className = editOpen ? "visible" : "";

  if (editOpen) {
    document.getElementById("task-count").value = state.tasks.length;
    buildInputs(state.tasks);
  }
}

function buildInputs(tasks) {
  const container = document.getElementById("task-inputs");
  container.innerHTML = "";
  tasks.forEach((task, i) => {
    const row = document.createElement("div");
    row.className = "task-input-row";
    row.innerHTML = '<span class="task-num">' + (i + 1) + '</span><input class="task-input" type="text" value="' + escHtml(task) + '" placeholder="Tâche ' + (i+1) + '">';
    container.appendChild(row);
  });
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function updateInputCount() {
  const n = Math.max(1, Math.min(15, parseInt(document.getElementById("task-count").value) || 1));
  const inputs = document.querySelectorAll(".task-input");
  const current = Array.from(inputs).map(i => i.value);

  const newTasks = [];
  for (let i = 0; i < n; i++) {
    newTasks.push(current[i] || "Tâche " + (i + 1));
  }
  buildInputs(newTasks);
}

function saveConfig() {
  const inputs = document.querySelectorAll(".task-input");
  const newTasks = Array.from(inputs).map(i => i.value.trim() || "Tâche sans nom");
  state.tasks = newTasks;
  state.checks = new Array(newTasks.length).fill(false);
  save(state);
  render();
  toggleEdit();
}

setInterval(() => {
  const today = getTodayStr();
  if (state.dateKey !== today) {
    state.dateKey = today;
    state.checks = new Array(state.tasks.length).fill(false);
    save(state);
    render();
  }
}, 30000);

init();
</script>
</body>
</html>
