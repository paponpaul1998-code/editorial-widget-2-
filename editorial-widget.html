<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial Widget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0ede8;
    --muted: #666;
    --faint: #2a2a2a;

    /* Couleurs alignées database Notion */
    --ar:        #9b8fce;
    --ar-bg:     #1e1a30;
    --ar-border: #332b52;

    --cl:        #e07950;
    --cl-bg:     #211610;
    --cl-border: #3d2418;

    --ae:        #5b9bd5;
    --ae-bg:     #101d2a;
    --ae-border: #1a3048;

    --ok:        #52c98a;
    --ok-bg:     #0e2118;
    --ok-border: #1a3a28;

    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); padding: 22px; font-size: 14px; }

  /* ── Setup ── */
  .setup { display: flex; flex-direction: column; gap: 12px; }
  .setup-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  input[type=text], input[type=password] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 8px 12px; outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--muted); }
  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; }
  .btn {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em;
    padding: 8px 14px; border-radius: 5px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    transition: background 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--faint); }
  .hint { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .error-msg { background: #1f1010; border: 1px solid #3a1818; border-radius: 5px; padding: 10px 12px; font-size: 12px; color: #e07070; line-height: 1.5; }

  /* ── Main ── */
  .main { display: none; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 8px; }
  .nav-btn {
    font-family: var(--mono); font-size: 16px; color: var(--muted);
    background: none; border: none; cursor: pointer; padding: 2px 6px;
    transition: color 0.15s; line-height: 1;
  }
  .nav-btn:hover { color: var(--text); }
  .nav-btn:disabled { color: var(--faint); cursor: default; }
  .week-info { text-align: center; }
  .week-number { font-family: var(--mono); font-size: 24px; font-weight: 500; line-height: 1; }
  .week-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 3px; }
  .week-current { font-family: var(--mono); font-size: 10px; color: var(--ok); margin-top: 2px; }

  /* Section label */
  .section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  /* Posts */
  .posts-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 18px; }
  .post-row {
    display: grid; grid-template-columns: 52px 1fr auto;
    align-items: center; gap: 8px; padding: 9px 11px;
    border-radius: 6px; border: 1px solid transparent;
    transition: opacity 0.2s;
  }
  .post-row.ar   { background: var(--ar-bg); border-color: var(--ar-border); }
  .post-row.cl   { background: var(--cl-bg); border-color: var(--cl-border); }
  .post-row.ae   { background: var(--ae-bg); border-color: var(--ae-border); }
  .post-row.done { background: var(--ok-bg); border-color: var(--ok-border); opacity: 0.55; }

  .post-day { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .post-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .post-template { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ar   .post-template { color: var(--ar); }
  .cl   .post-template { color: var(--cl); }
  .ae   .post-template { color: var(--ae); }
  .done .post-template { color: var(--ok); text-decoration: line-through; }
  .post-cat  { font-size: 11px; color: var(--muted); }
  .post-status { font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; }
  .post-status.placed { color: var(--ok); }

  /* Summary */
  .divider { height: 1px; background: var(--border); margin: 14px 0; }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 14px; }
  .summary-card { padding: 9px 10px; border-radius: 5px; border: 1px solid; }
  .summary-card.ar { background: var(--ar-bg); border-color: var(--ar-border); }
  .summary-card.cl { background: var(--cl-bg); border-color: var(--cl-border); }
  .summary-card.ae { background: var(--ae-bg); border-color: var(--ae-border); }
  .summary-nums { display: flex; align-items: baseline; gap: 3px; margin-bottom: 3px; }
  .summary-done { font-family: var(--mono); font-size: 17px; font-weight: 500; }
  .ar .summary-done { color: var(--ar); }
  .cl .summary-done { color: var(--cl); }
  .ae .summary-done { color: var(--ae); }
  .summary-total { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .summary-label { font-size: 10px; color: var(--muted); line-height: 1.3; }

  /* Footer */
  .footer { display: flex; align-items: center; justify-content: space-between; }
  .refresh-btn { font-family: var(--mono); font-size: 10px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0; transition: color 0.15s; }
  .refresh-btn:hover { color: var(--text); }
  .last-update { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .reset-btn { font-family: var(--mono); font-size: 10px; color: #444; background: none; border: none; cursor: pointer; padding: 0; }
  .reset-btn:hover { color: #e07070; }

  .loader { text-align: center; padding: 28px; font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
  .no-posts { text-align: center; padding: 18px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<!-- Setup -->
<div class="setup" id="setup">
  <div class="setup-title">Configuration</div>
  <div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Clé API Notion</div>
    <input type="password" id="apiKey" placeholder="ntn_..." />
  </div>
  <div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Database ID</div>
    <div class="input-row">
      <input type="text" id="dbId" placeholder="f35b96bf..." />
      <button class="btn" onclick="saveConfig()">Connecter</button>
    </div>
  </div>
  <div class="hint">Stocké uniquement dans ton navigateur.</div>
  <div id="setupError"></div>
</div>

<!-- Main -->
<div class="main" id="main">

  <div class="header">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">‹</button>
    <div class="week-info">
      <div class="week-number">Sem. <span id="weekNum">—</span></div>
      <div class="week-sub" id="dateRange">—</div>
      <div class="week-current" id="currentIndicator"></div>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">›</button>
  </div>

  <div class="section-label">Publications prévues</div>
  <div id="postsList" class="posts-list"></div>

  <div class="divider"></div>

  <div class="section-label" style="margin-bottom:8px;">Ce mois — avancement</div>
  <div class="summary-grid" id="summaryGrid"></div>

  <div class="footer">
    <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
    <span class="last-update" id="lastUpdate"></span>
    <button class="reset-btn" onclick="resetConfig()">Déconnecter</button>
  </div>

</div>

<script>
const PROXY = 'https://corsproxy.io/?url=';

/* ── Modèle éditorial ── */
const SCHEDULE = [
  { cycle:0, day:0, cat:'ar', template:'Focus' },
  { cycle:0, day:1, cat:'ar', template:'Le 8ème art' },
  { cycle:0, day:3, cat:'cl', template:'Lifestyle gaming' },
  { cycle:1, day:0, cat:'ar', template:'Analyse statistique' },
  { cycle:1, day:2, cat:'ae', template:'Évènement' },
  { cycle:1, day:3, cat:'cl', template:'Reco culturelle' },
  { cycle:2, day:1, cat:'ar', template:'Review' },
  { cycle:2, day:2, cat:'ar', template:'Le pouvoir des images' },
  { cycle:2, day:4, cat:'ae', template:'Bulletin e-sport' },
  { cycle:3, day:0, cat:'ar', template:'Focus' },
  { cycle:3, day:2, cat:'cl', template:'Lifestyle gaming' },
  { cycle:3, day:3, cat:'ar', template:'Le 8ème art' },
];

const CAT_LABELS = { ar:'Analyse & Review', cl:'Culture & Lifestyle', ae:'Actualité & Évènement' };
const DAYS_SHORT  = ['LUN','MAR','MER','JEU','VEN','SAM','DIM'];

/* ── Semaine courante (offset = 0 par défaut) ── */
let weekOffset = 0;

function getISOWeek(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - y) / 86400000) + 1) / 7);
}

function getWeekBounds(baseDate, offset) {
  const d = new Date(baseDate);
  d.setDate(d.getDate() + offset * 7);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  const mon = new Date(d);
  const sun = new Date(d); sun.setDate(sun.getDate() + 6);
  return { mon, sun, ref: new Date(d) };
}

function getMonthBounds(date) {
  return {
    first: new Date(date.getFullYear(), date.getMonth(), 1),
    last:  new Date(date.getFullYear(), date.getMonth() + 1, 0)
  };
}

function fmtDate(dt) { return dt.toLocaleDateString('fr-FR', { day:'numeric', month:'short' }); }
function toISO(dt)   { return dt.toISOString().split('T')[0]; }

function navigate(dir) {
  weekOffset += dir;
  loadData();
}

/* ── Config ── */
function saveConfig() {
  const key = document.getElementById('apiKey').value.trim();
  const db  = document.getElementById('dbId').value.trim();
  if (!key || !db) { document.getElementById('setupError').innerHTML = '<div class="error-msg">Remplis les deux champs.</div>'; return; }
  localStorage.setItem('ntn_key', key);
  localStorage.setItem('ntn_db',  db);
  showMain(); loadData();
}

function resetConfig() {
  localStorage.removeItem('ntn_key');
  localStorage.removeItem('ntn_db');
  weekOffset = 0;
  document.getElementById('main').style.display  = 'none';
  document.getElementById('setup').style.display = 'flex';
}

function showMain() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display  = 'block';
}

/* ── API Notion ── */
async function queryNotion(key, dbId, filter) {
  const url = PROXY + encodeURIComponent(`https://api.notion.com/v1/databases/${dbId}/query`);
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${key}`,
      'Notion-Version': '2022-06-28',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(filter)
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || `HTTP ${res.status}`); }
  return res.json();
}

/* ── Helpers propriétés Notion ── */
function getCat(page) {
  const props = page.properties;
  const p = props['Catégorie'] || props['Cat\u00e9gorie'] || props['Category'];
  if (!p) return null;
  const val = (p.select?.name || p.multi_select?.[0]?.name || '').toLowerCase();
  if (val.includes('analyse') || val.includes('review')) return 'ar';
  if (val.includes('culture') || val.includes('lifestyle')) return 'cl';
  if (val.includes('actu') || val.includes('\u00e9v\u00e8nement') || val.includes('evenement') || val.includes('\u00e9v\u00e9nement')) return 'ae';
  return null;
}

function getTemplateName(page) {
  const props = page.properties;
  const p = props['Nom de template'] || props['Template'] || props['template'];
  if (!p) return '';
  if (p.select)            return p.select.name || '';
  if (p.multi_select)      return p.multi_select[0]?.name || '';
  if (p.rich_text)         return p.rich_text[0]?.plain_text || '';
  if (p.title)             return p.title[0]?.plain_text || '';
  return '';
}

function getTitle(page) {
  const props = page.properties;
  const p = props['Résumé de la publication'] || props['Nom'] || props['Name'] || props['Titre'] || props['Title'];
  return p?.title?.[0]?.plain_text || p?.rich_text?.[0]?.plain_text || '';
}

/* Normalise une chaîne pour comparaison souple */
function norm(s) {
  return (s || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]/g, '');
}

/* ── Rendu principal ── */
async function loadData() {
  const key  = localStorage.getItem('ntn_key');
  const dbId = localStorage.getItem('ntn_db');
  if (!key || !dbId) return;

  const list = document.getElementById('postsList');
  list.innerHTML = '<div class="loader">Chargement...</div>';

  try {
    const now  = new Date();
    const { mon, sun } = getWeekBounds(now, weekOffset);
    const weekNum = getISOWeek(mon);
    const cycleIdx = (weekNum - 1) % 4;

    /* Header */
    document.getElementById('weekNum').textContent  = weekNum;
    document.getElementById('dateRange').textContent = `${fmtDate(mon)} – ${fmtDate(sun)}`;
    document.getElementById('currentIndicator').textContent = weekOffset === 0 ? '● semaine en cours' : weekOffset > 0 ? `+${weekOffset} sem.` : `${weekOffset} sem.`;
    document.getElementById('prevBtn').disabled = false;
    document.getElementById('nextBtn').disabled = false;

    /* Mois de référence : celui du lundi de la semaine affichée */
    const { first, last } = getMonthBounds(mon);

    const [weekData, monthData] = await Promise.all([
      queryNotion(key, dbId, {
        filter: { and: [
          { property: 'Date de publication', date: { on_or_after:  toISO(mon) } },
          { property: 'Date de publication', date: { on_or_before: toISO(sun) } }
        ]}
      }),
      queryNotion(key, dbId, {
        filter: { and: [
          { property: 'Date de publication', date: { on_or_after:  toISO(first) } },
          { property: 'Date de publication', date: { on_or_before: toISO(last)  } }
        ]}
      })
    ]);

    /*
      Matching : une tâche est "done" si, parmi les publications placées cette semaine,
      il en existe une dont :
        - la catégorie correspond (cat)
        - ET le nom de template correspond (comparaison normalisée)
      Le jour n'est PAS pris en compte.
    */
    const placedThisWeek = weekData.results.map(page => ({
      cat:      getCat(page),
      template: norm(getTemplateName(page)),
      title:    getTitle(page)
    }));

    function isMatched(task) {
      return placedThisWeek.some(p =>
        p.cat === task.cat && p.template === norm(task.template)
      );
    }

    function getMatchedTitle(task) {
      const match = placedThisWeek.find(p =>
        p.cat === task.cat && p.template === norm(task.template)
      );
      return match?.title || null;
    }

    /* Rendu semaine */
    const weekSchedule = SCHEDULE.filter(p => p.cycle === cycleIdx).sort((a,b) => a.day - b.day);

    list.innerHTML = weekSchedule.length === 0
      ? '<div class="no-posts">Aucun post prévu cette semaine</div>'
      : weekSchedule.map(task => {
          const done  = isMatched(task);
          const title = done ? (getMatchedTitle(task) || task.template) : task.template;
          return `<div class="post-row ${done ? 'done' : task.cat}">
            <div class="post-day">${DAYS_SHORT[task.day]}<br><span style="font-size:9px;opacity:0.5">indicatif</span></div>
            <div class="post-info">
              <div class="post-template">${title}</div>
              <div class="post-cat">${CAT_LABELS[task.cat]}</div>
            </div>
            <div class="post-status ${done ? 'placed' : ''}">
              ${done ? '✓ Placé' : 'À planifier'}
            </div>
          </div>`;
        }).join('');

    /* Résumé mensuel */
    const monthlyCounts = { ar:0, cl:0, ae:0 };
    SCHEDULE.forEach(p => monthlyCounts[p.cat]++);

    const monthCounts = { ar:0, cl:0, ae:0 };
    monthData.results.forEach(page => {
      const cat = getCat(page);
      if (cat) monthCounts[cat]++;
    });

    document.getElementById('summaryGrid').innerHTML = Object.entries(monthlyCounts).map(([cat, total]) =>
      `<div class="summary-card ${cat}">
        <div class="summary-nums">
          <span class="summary-done">${monthCounts[cat]}</span>
          <span class="summary-total">/ ${total}</span>
        </div>
        <div class="summary-label">${CAT_LABELS[cat]}</div>
      </div>`
    ).join('');

    document.getElementById('lastUpdate').textContent =
      `Mis à jour ${new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })}`;

  } catch(e) {
    list.innerHTML = `<div class="error-msg">Erreur : ${e.message}<br><span style="font-size:10px;opacity:0.7">Vérifie ta clé API et la connexion à la database.</span></div>`;
  }
}

/* ── Init ── */
const savedKey = localStorage.getItem('ntn_key');
const savedDb  = localStorage.getItem('ntn_db');
if (savedKey && savedDb) { showMain(); loadData(); }
</script>
</body>
</html>
